name: sync

# Scrapes Garmin + Keep into Supabase every 6 hours (and on demand).
# GitHub's scheduler can run a few minutes late under load — fine at this cadence.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

# Avoid overlapping runs if one is slow.
concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python -m scraper.main
